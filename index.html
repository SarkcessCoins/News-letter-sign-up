<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
 
  <main class="container">
    <header>
      <picture>
       <source media="(min-width:601px )" srcset="assets/images/illustration-sign-up-desktop.svg">
       <img src="assets/images/illustration-sign-up-mobile.svg" alt="">
      </picture>

    </header>


  <section>
      <!-- Sign-up form start -->
      <h1>Stay updated!</h1>
      <h2>Join 60,000+ product managers receiving monthly updates on: </h2>

    <ul>
    <li>Product discovery and building what matters</li>
    <li>Measuring to ensure updates are a success</li>
    <li>And much more!</li>
    </ul>
    <form action="">
      <div class="email"><h5>Email address</h5> <h5 class="error-message">valid email required</h5> </div>
      <input type="email" placeholder=" email@company.com" class="inputField">
      <button class="subscribeBtn" type="submit">Subscribe to monthly newsletter</button>
    </form>
    <!-- Sign-up form end -->
   
  </section>
    
  
  
    
   
    
   
  

  </main>

  <footer>
<div class="attribution">
  Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
  Coded by <a href="#">Your Name Here</a>.
</div>
  </footer>
 
  <script src="main.js"></script>
</body>
</html>
